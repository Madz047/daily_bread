<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Bread — Devotional</title>
<style>
/* ── Google Fonts replaced with safe system serif/sans stacks ── */
:root {
  --cream: #FAF7F2;
  --warm-gold: #C9A96E;
  --pale-gold: #F0E6D3;
  --charcoal: #2C2C2C;
  --medium-gray: #7A7A7A;
  --light-gray: #E8E4DE;
  --soft-white: #FFFDF9;
  --deep-brown: #3D2B1F;
  --serif: Georgia, 'Times New Roman', Times, serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--cream);
  color: var(--charcoal);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────────── */
header {
  text-align: center;
  padding: 56px 24px 36px;
}
header::after {
  content: '';
  display: block;
  width: 44px;
  height: 1px;
  background: var(--warm-gold);
  margin: 22px auto 0;
}
.eyebrow {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--warm-gold);
  text-transform: uppercase;
  margin-bottom: 14px;
  font-weight: 400;
}
h1 {
  font-family: var(--serif);
  font-weight: normal;
  font-size: clamp(32px, 5.5vw, 52px);
  line-height: 1.15;
  color: var(--charcoal);
  letter-spacing: -0.3px;
}
.hsub {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(14px, 2vw, 17px);
  color: var(--medium-gray);
  margin-top: 10px;
}

/* ── SCREENS ────────────────────────────────── */
.screen { display: none; }
.screen.active { display: block; }

/* ── EMOTION GRID ───────────────────────────── */
#escreen {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 20px 80px;
}
.ptxt {
  text-align: center;
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(17px, 2.5vw, 22px);
  margin-bottom: 8px;
  color: var(--charcoal);
}
.psub {
  text-align: center;
  font-size: 11px;
  color: var(--medium-gray);
  letter-spacing: 1.5px;
  margin-bottom: 36px;
  text-transform: uppercase;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
  gap: 12px;
}
.card {
  background: var(--soft-white);
  border: 1px solid var(--light-gray);
  border-radius: 3px;
  padding: 20px 14px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  text-align: center;
  position: relative;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}
.card:hover {
  border-color: var(--warm-gold);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.07);
}
.card:active { transform: translateY(0); }
.card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--warm-gold);
  transform: scaleX(0);
  transition: transform 0.2s;
  transform-origin: left;
}
.card:hover::after { transform: scaleX(1); }
.eicon { font-size: 26px; display: block; margin-bottom: 9px; }
.ename {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--charcoal);
  display: block;
  margin-bottom: 5px;
  font-weight: 600;
}
.edesc {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--medium-gray);
  line-height: 1.5;
  display: block;
}
.ecount {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--warm-gold);
  display: block;
  margin-top: 8px;
  text-transform: uppercase;
}

/* ── DEVOTION SCREEN ────────────────────────── */
#dscreen {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px 100px;
  animation: fadeUp 0.5s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.dtop {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 28px;
  text-align: center;
}
.stag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--pale-gold);
  border: 1px solid var(--warm-gold);
  padding: 6px 16px;
  border-radius: 3px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--deep-brown);
  font-weight: 600;
}
.ctag {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--medium-gray);
}
.vblock {
  background: var(--soft-white);
  border-left: 3px solid var(--warm-gold);
  padding: 24px 28px;
  border-radius: 0 3px 3px 0;
  margin-bottom: 6px;
}
.vtxt {
  font-family: var(--serif);
  font-size: clamp(15px, 2.2vw, 19px);
  font-style: italic;
  line-height: 1.75;
  color: var(--charcoal);
  margin-bottom: 12px;
}
.vref {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--warm-gold);
  text-transform: uppercase;
  font-weight: 600;
}
.divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 24px 0 12px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--light-gray);
}
.dlabel {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--medium-gray);
  white-space: nowrap;
}
.rtxt {
  font-family: var(--serif);
  font-size: clamp(14px, 2vw, 17px);
  line-height: 1.88;
  color: var(--charcoal);
}
.rtxt p + p { margin-top: 14px; }
.pblock {
  background: var(--pale-gold);
  border-radius: 3px;
  padding: 20px 24px;
  margin-top: 4px;
}
.ptxtp {
  font-family: var(--serif);
  font-size: clamp(13px, 2vw, 16px);
  font-style: italic;
  line-height: 1.85;
  color: var(--deep-brown);
}
.dots {
  display: flex;
  gap: 7px;
  justify-content: center;
  margin-top: 24px;
}
.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--light-gray);
  transition: background 0.25s, transform 0.2s;
}
.dot.active { background: var(--warm-gold); transform: scale(1.3); }
.dot.seen   { background: var(--medium-gray); opacity: 0.4; }
.btnrow {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 30px;
  flex-wrap: wrap;
}
.btn {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 13px 22px;
  border: none;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  font-weight: 500;
}
.btns {
  background: transparent;
  color: var(--charcoal);
  border: 1px solid var(--light-gray);
}
.btns:hover { border-color: var(--warm-gold); color: var(--deep-brown); }
.btnp { background: var(--charcoal); color: var(--cream); border: 1px solid var(--charcoal); }
.btnp:hover { background: var(--deep-brown); border-color: var(--deep-brown); }

footer {
  text-align: center;
  padding: 24px;
  font-size: 10px;
  color: var(--light-gray);
  letter-spacing: 1.5px;
}
</style>
</head>
<body>

<header>
  <div class="eyebrow">Daily Bread &middot; Devotional</div>
  <h1>How are you<br>feeling today?</h1>
  <p class="hsub">Receive a verse, reflection &amp; prayer for where you are right now.</p>
</header>

<div id="escreen" class="screen active">

  <div class="grid" id="grid"></div>

<!-- DEVOTION SCREEN -->
<div id="dscreen" class="screen">
  <div class="dtop">
    <span class="stag" id="stag"></span>
    <span class="ctag" id="ctag"></span>
  </div>
  <div class="vblock">
    <div class="vtxt" id="vtxt"></div>
    <div class="vref" id="vref"></div>
  </div>
  <div class="divider"><span class="dlabel">Reflection</span></div>
  <div class="rtxt" id="rtxt"></div>
  <div class="divider"><span class="dlabel">Prayer</span></div>
  <div class="pblock"><div class="ptxtp" id="ptxtp"></div></div>
  <div class="dots" id="dots"></div>
  <div class="btnrow">
    <button class="btn btns" onclick="goBack()">&#8592; Choose Another State</button>
    <button class="btn btnp" id="nbtn" onclick="getAnother()">Another Word for This &#8594;</button>
  </div>
</div>

<footer style="text-align:center; margin-top:40px; font-size:12px; opacity:0.7;">
  © 2026 Madelyn Combalicer — All Rights Reserved</footer>

D.anxious = [
  {
    v: '"Do not be anxious about anything, but in every situation, by prayer and petition, with thanksgiving, present your requests to God. And the peace of God, which transcends all understanding, will guard your hearts and your minds in Christ Jesus."',
    r: 'Philippians 4:6\u20137',
    f: '<p>Anxiety is often the gap between what we cannot control and our desperate need to control it. God does not dismiss your worry or shame you for it \u2014 He invites you to hand it over. Prayer here is not a technique for calming down; it is an act of trust. You are saying: I cannot carry this, but You can.</p><p>Notice that Paul pairs petition with thanksgiving. Gratitude reorients us \u2014 it reminds us of past faithfulness and loosens the grip of present fear. In that release, something shifts. The peace that guards your heart is not earned by managing your thoughts correctly; it arrives when you stop trying to solve what only God can hold.</p>',
    p: 'Lord, I bring You every anxious thought \u2014 the ones I can name and the ones I cannot. I release my grip on outcomes I cannot control, and I ask You to guard my heart with a peace that doesn\'t depend on my circumstances. I trust You. Amen.'
  },
  {
    v: '"Cast all your anxiety on him because he cares for you."',
    r: '1 Peter 5:7',
    f: '<p>This verse contains a word that is easy to skip over: \u201call.\u201d Not some of your worry. Not the acceptable anxieties. All of it \u2014 the petty fears and the deep ones, the rational concerns and the irrational spirals. God can handle the weight of your complete anxiety.</p><p>And the reason He invites this is not duty but care. He genuinely, personally cares for you \u2014 not as a category or a concept, but as a person He knows by name. Your anxiety is not inconvenient to Him; it is something He leans toward with compassion. Let that truth soften what is tight inside you today.</p>',
    p: 'Father, I cast every worry onto You today \u2014 the small and the consuming. Thank You that You care for me personally, specifically, completely. Help me walk lighter because I\'ve left the weight with You. Amen.'
  },
  {
    v: '"When anxiety was great within me, your consolation brought me joy."',
    r: 'Psalm 94:19',
    f: '<p>The psalmist does not pretend anxiety never came. He names it plainly \u2014 \u201cgreat within me\u201d \u2014 and then names what met it: God\'s consolation. This is the honest arc of the spiritual life. Not the absence of anxiety, but the discovery of what is greater.</p><p>Consolation is a tender word. It does not mean God talks you out of your feelings. It means He enters them with you, sits with you in them, and somehow \u2014 without removing the situation \u2014 brings a quiet joy that does not depend on resolution. You can have peace and still feel the weight. They coexist in the presence of God.</p>',
    p: 'God, my anxiety is real and large. I don\'t ask You to take away my feelings \u2014 I ask You to meet me inside them. Bring Your consolation. Let me find in You a joy that exists alongside the worry. Amen.'
  },
  {
    v: '"For God has not given us a spirit of fear, but of power, love, and self-discipline."',
    r: '2 Timothy 1:7',
    f: '<p>Fear \u2014 particularly the chronic, nameless dread that underlies anxiety \u2014 is not from God. That does not mean we are weak for feeling it; it means we are not obligated to live under its authority. What God has given us instead is a three-part alternative: power, love, and self-discipline.</p><p>Power to act despite fear. Love that casts out fear by occupying the space it wants to own. And self-discipline \u2014 the ability to choose our focus and redirect our minds. These are gifts already given, not distant virtues to achieve. You have been equipped. The anxiety does not get the final word.</p>',
    p: 'Lord, remind me that fear is not my inheritance. You have given me power, love, and a sound mind. Where anxiety speaks loud, let these three speak louder. I choose today to walk in what You have already given me. Amen.'
  }
];

D.grateful = [
  {
    v: '"Give thanks in all circumstances; for this is God\'s will for you in Christ Jesus."',
    r: '1 Thessalonians 5:18',
    f: '<p>Gratitude is one of the most transformative spiritual postures we can inhabit. It does not deny hardship \u2014 \u201cin all circumstances\u201d includes the difficult ones \u2014 but it chooses to look for the fingerprints of grace even there.</p><p>When we cultivate thankfulness, we train our eyes to see abundance where before we saw only scarcity. Let your gratitude today be an act of praise \u2014 not because everything is perfect, but because God is good and His goodness is woven into even the most ordinary moments of this day.</p>',
    p: 'Thank You, Lord \u2014 for this breath, this day, for the specific gifts You have placed in my life. Heighten my awareness of Your goodness today. Let thankfulness be the lens through which I see everything. Amen.'
  },
  {
    v: '"Bless the Lord, O my soul, and forget not all his benefits."',
    r: 'Psalm 103:2',
    f: '<p>The psalmist speaks to his own soul \u2014 almost as if the soul needs to be reminded, because it is so prone to forgetting. Gratitude is partly a discipline of memory: choosing to recall what God has done, rather than fixating on what is lacking.</p><p>What are the benefits you might be forgetting today? Health that is easy to overlook. Relationships that have been constant. Prayers that were answered quietly. The invitation of this verse is to make a list \u2014 mental or written \u2014 and let it reshape how you experience the next few hours.</p>',

  {
    v: '"He will take great delight in you; in his love he will no longer rebuke you, but will rejoice over you with singing."',
    r: 'Zephaniah 3:17',
    f: '<p>There is something almost startling about this verse: God rejoicing over you with singing. Not tolerating you. Not managing you. Delighting in you with music. Your gratitude today is not one-directional \u2014 it mirrors something God Himself experiences toward you.</p><p>Whatever has sparked gladness in you today, receive it as a gift from a Father who loves to see His children flourish. Your joy delights Him. Your thankfulness is an act of resonance \u2014 your heart responding to His.</p>',

D.lonely = [
  {
    v: '"The Lord himself goes before you and will be with you; he will never leave you nor forsake you. Do not be afraid; do not be discouraged."',
    r: 'Deuteronomy 31:8',
    f: '<p>Loneliness is one of the most tender aches of the human experience \u2014 the sense of being unseen, unaccompanied, or simply without someone who truly knows you. Into that ache, God speaks one of His most repeated promises: I will not leave you.</p><p>Not as a religious comfort, but as a grounded reality. The God of the universe has committed Himself to your presence. You are not navigating this life \u2014 or this moment \u2014 alone. He goes before you into the unknown, walks beside you in the ordinary, and stays when everyone else has moved on.</p>',

    v: '"A father to the fatherless, a defender of widows, is God in his holy dwelling."',

    p: 'Father, be to me today what only You can be \u2014 a presence that covers what feels uncovered, a voice for what feels unheard. I receive Your care. I am not alone because I am Yours. Amen.'
  }
];

D.joyful = [
  {
    v: '"Rejoice in the Lord always. I will say it again: Rejoice!"',
    r: 'Philippians 4:4',
    f: '<p>Paul wrote these words from a Roman prison \u2014 proof that his joy was not dependent on his environment. Joy in Scripture is not a mood; it is a decision anchored in the unchanging character of God. When circumstances align to make joy easy, it is a gift to receive wholeheartedly.</p><p>Rejoicing \u201cin the Lord\u201d grounds your gladness in something that cannot be taken away. Let your joy run deep today \u2014 deeper than the circumstances that sparked it. Root it in God Himself, so that when circumstances shift, the joy has somewhere to live that cannot be shaken.</p>',

  {
    v: '"You make known to me the path of life; you will fill me with joy in your presence, with eternal pleasures at your right hand."',

    r: 'Psalm 118:24',
    f: '<p>Every day is a deliberate act of creation. God made this particular day \u2014 with its specific light, its particular people, its unique moments that will never be repeated. To rejoice in it is to honor the craft of the Maker.</p><p>Gladness is a form of recognition: I see what You have given, and I receive it. On days when joy comes naturally, the spiritual work is to notice what is worth celebrating \u2014 and to let that noticing deepen your awareness of a God who continuously creates good things for His children.</p>',

  {

/* ── APP LOGIC ─────────────────────────────── */
var curEmotion = null;
var curIdx = 0;

function renderEmotions() {
  var g = document.getElementById('grid');
  g.innerHTML = emotions.map(function(e) {
    var count = D[e.id] ? D[e.id].length : 0;
    return '<div class="card" onclick="pick(\'' + e.id + '\',\'' + e.name + '\')">' +
      '<span class="eicon">' + e.icon + '</span>' +
      '<span class="ename">' + e.name + '</span>' +
      '<span class="edesc">' + e.desc + '</span>' +
      '<span class="ecount">' + count + ' reflections</span>' +
      '</div>';
  }).join('');
}

function pick(id, name) {
  curEmotion = id;
  curIdx = 0;
  show(name);
}

function show(name) {
  var pool = D[curEmotion];
  if (!pool) return;
  var dev = pool[curIdx];
  var e = emotions.filter(function(x) { return x.id === curEmotion; })[0];

  document.getElementById('stag').innerHTML = e.icon + '&nbsp; Feeling ' + name;
  document.getElementById('ctag').textContent = 'Reflection ' + (curIdx + 1) + ' of ' + pool.length;
  document.getElementById('vtxt').textContent = dev.v;
  document.getElementById('vref').textContent = '\u2014 ' + dev.r;
  document.getElementById('rtxt').innerHTML = dev.f;
  document.getElementById('ptxtp').textContent = dev.p;

  var dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = pool.map(function(_, i) {
    var cls = 'dot';
    if (i === curIdx) cls += ' active';
    else if (i < curIdx) cls += ' seen';
    return '<div class="' + cls + '"></div>';
  }).join('');

  var btn = document.getElementById('nbtn');
  btn.textContent = (curIdx >= pool.length - 1) ? 'Start Over \u21BA' : 'Another Word for This \u2192';

  document.getElementById('escreen').classList.remove('active');
  var s = document.getElementById('dscreen');
  s.classList.add('active');
  s.style.animation = 'none';
  void s.offsetWidth;
  s.style.animation = 'fadeUp .5s ease forwards';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goBack() {
  document.getElementById('dscreen').classList.remove('active');
  document.getElementById('escreen').classList.add('active');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function getAnother() {
  var pool = D[curEmotion];
  curIdx = (curIdx + 1) % pool.length;
  var e = emotions.filter(function(x) { return x.id === curEmotion; })[0];
  show(e.name);
}

renderEmotions();
</script>
</body>
